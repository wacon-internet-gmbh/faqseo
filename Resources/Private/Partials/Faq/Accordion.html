<div class="faq accordion-item">
    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse{data.uid}" aria-expanded="false" aria-controls="collapse{data.uid}">{data.header}</button>
    <div id="collapse{data.uid}" class="accordion-collapse collapse"{f:if(condition: parentRecord, then: ' data-bs-parent="#c{parentRecord.uid}')}">
        <div class="accordion-body">
            <f:format.html>{data.bodytext}</f:format.html>
        </div>
    </div>
</div>
